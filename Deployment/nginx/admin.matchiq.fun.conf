server {
    listen 443 ssl http2;
    server_name admin.matchiq.fun;

    ssl_certificate     /etc/letsencrypt/live/admin.matchiq.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.matchiq.fun/privkey.pem;

    root /var/www/UnityTiles/AdminPanel/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}

server {
    listen 80;
    server_name admin.matchiq.fun;
    return 301 https://$host$request_uri;
}
