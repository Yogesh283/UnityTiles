server {
    listen 443 ssl http2;
    server_name api.matchiq.fun;

    ssl_certificate     /etc/nginx/ssl-certificates/api.matchiq.fun.crt;
    ssl_certificate_key /etc/nginx/ssl-certificates/api.matchiq.fun.key;

    # WebSocket tournament rooms — must use HTTP/1.1 upgrade
    location /ws/tournament/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name api.matchiq.fun;
    return 301 https://$host$request_uri;
}
