version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: game
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../Database/tilesclash.sql:/docker-entrypoint-initdb.d/01-schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ../Backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/game
      REDIS_URL: redis://redis:6379/0
      GOOGLE_PLAY_PACKAGE_NAME: fun.matchiq.game
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: /secrets/google-play-service-account.json
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
